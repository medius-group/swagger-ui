<!-- HTML for static distribution bundle build -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Medius Cloud API</title>
    <link rel="stylesheet" type="text/css" href="./swagger-ui.css" >
    <link rel="stylesheet" type="text/css" href="css/theme-medius.css" >
    <link rel="stylesheet" type="text/css" href="index.css" />
    <link rel="icon" type="image/png" href="./favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="./favicon-16x16.png" sizes="16x16" />
  </head>

  <body>
    <div id="swagger-ui"></div>
    <script src="./swagger-ui-bundle.js" charset="UTF-8"> </script>
    <script src="./swagger-ui-standalone-preset.js" charset="UTF-8"> </script>
    <script>
    window.onload = function() {

      var clientId = "swagger-ui";
      var defaultScope = "Integration";
      var appName = "Medius Cloud Suite";
      
      var defaultUrl = window.location.search.match(/url=([^&]+)/);
      if (defaultUrl && defaultUrl.length > 1) {
        defaultUrl = decodeURIComponent(defaultUrl[1]);
      } else {
        var location = window.location;
       
        if(location.pathname.includes("/api/documentation")) {
            defaultUrl = "https://cloud.mediusflow.com/" + location.pathname.match(/(\w+)\/api\/documentation/)[1] + "/api/swagger/stable";
          }
        else if(location.pathname.includes("/documentation")) {
            defaultUrl = "https://api.medius.com/" + location.pathname.match(/(\w+)\/documentation/)[1] + "/openapi/stable";
          }
        else {
            defaultUrl = "http://petstore.swagger.io/v2/swagger.json";
          }
      }
      
      if (defaultUrl.includes("suiteapi") || defaultUrl.includes("privateapi")) {
        clientId = "api://medius-suite-dev";
        defaultScope = "api://medius-suite-dev/SwaggerUI";
        appName = "Medius Suite API";
      }
      
      // Begin Swagger UI call region
      const ui = SwaggerUIBundle({
        url: defaultUrl,
        dom_id: '#swagger-ui',
        defaultModelsExpandDepth: -1,
        docExpansion: "none",
        //oauth2RedirectUrl: "https://cloud.mediusflow.com/documentation/api/documentation/o2c.html",
        oauth2RedirectUrl: "https://api.medius.com/documentation/documentation/o2c.html",
        //oauth2RedirectUrl: "https://api.medius.com/mediusapisandboxQA/documentation/o2c.html",
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout",
      });
      // End Swagger UI call region

      ui.initOAuth({
        clientId: clientId,
        clientSecret: "your-client-secret-if-required",
        realm: "your-realms",
        appName: appName,
        scopeSeparator: " ",
        scopes: defaultScope,
        additionalQueryStringParams: {test: "hello"},
        usePkceWithAuthorizationCodeGrant: true
      });

      window.ui = ui
    }
  </script>
    <!--script src="./swagger-initializer.js" charset="UTF-8"> </script-->
  </body>
</html>
